<div class="login-container">
  <div class="login-box">
    <h2>Login</h2>
    
    <div class="input-group">
      <input 
        type="email" 
        [(ngModel)]="email" 
        placeholder="Email">
    </div>
    
    <div class="input-group">
      <input 
        type="password" 
        [(ngModel)]="password" 
        placeholder="Password">
    </div>
    
    <button (click)="login()">Login</button>
    
    <div *ngIf="error" class="error">
      {{ error }}
    </div>
  </div>
</div>
