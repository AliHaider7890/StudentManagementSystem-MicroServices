# API Gateway - application.properties mein yeh add karo:
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web.reactive=DEBUG
logging.level.reactor.netty=DEBUG
logging.level.org.springframework.cloud.gateway.handler=TRACE
logging.level.org.springframework.cloud.gateway.route=TRACE
logging.level.com.netflix.discovery=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.root=INFO

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariCP-Pool
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.validation-timeout=3000

feign.circuitbreaker.enabled=true
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# Resilience4j Circuit Breaker for Teacher Service
resilience4j.circuitbreaker.instances.teacherServiceCB.register-health-indicator=true
resilience4j.circuitbreaker.instances.teacherServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.teacherServiceCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.teacherServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.teacherServiceCB.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.teacherServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.teacherServiceCB.automatic-transition-from-open-to-half-open-enabled=true

# Record Exceptions
resilience4j.circuitbreaker.instances.teacherServiceCB.record-exceptions[0]=feign.FeignException
resilience4j.circuitbreaker.instances.teacherServiceCB.record-exceptions[1]=java.util.concurrent.TimeoutException
resilience4j.circuitbreaker.instances.teacherServiceCB.record-exceptions[2]=java.io.IOException

# Retry Configuration
resilience4j.retry.instances.teacherServiceRetry.max-attempts=3
resilience4j.retry.instances.teacherServiceRetry.wait-duration=1s
resilience4j.retry.instances.teacherServiceRetry.retry-exceptions[0]=feign.FeignException
resilience4j.retry.instances.teacherServiceRetry.retry-exceptions[1]=java.util.concurrent.TimeoutException

# TimeLimiter
resilience4j.timelimiter.instances.teacherServiceTL.timeout-duration=3s

# Actuator
management.endpoints.web.exposure.include=health,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.endpoint.circuitbreakers.enabled=true
management.endpoint.circuitbreakerevents.enabled=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest



spring.kafka.bootstrap-servers=host.docker.internal:9092
#spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=student-created-topic
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=com.example.auth.Event.StudentCreateEvent:com.example.Course.Event.StudentCreateEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
resilience4j.ratelimiter.instances.courseLimiter.limitForPeriod=5
resilience4j.ratelimiter.instances.courseLimiter.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.courseLimiter.timeoutDuration=0