spring.application.name=COURSE-SERVICE
#server.port=9092
#For Kafka Only
server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#docker run -p 9092:9092 -e SPRING_DATASOURCE_URL="jdbc:mysql://host.docker.internal:3306/employee_db?useSSL=false" -e SPRING_DATASOURCE_USERNAME="root" -e SPRING_DATASOURCE_PASSWORD="root" course-service:latest
eureka.instance.prefer-ip-address=true
