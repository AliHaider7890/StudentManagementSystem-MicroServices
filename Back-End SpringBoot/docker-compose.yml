version: '3.8'

services:

  serviceregistry:
    build: ./service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - micro-net

  course-service:
    build: ./course-service
    container_name: course-service
    ports:
      - "9092:9092"
    depends_on:
      - serviceregistry
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://192.168.100.37:3306/employee_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://serviceregistry:8761/eureka/ # eureka.client.service-url.defaultZone=http://serviceregistry:8761/eureka/
    networks:
      - micro-net

  teacher-service:
    build: ./teacher-service
    container_name: teacher-service
    ports:
      - "9091:9091"
    depends_on:
      - serviceregistry
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://192.168.100.37:3306/employee_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://serviceregistry:8761/eureka/
    networks:
      - micro-net

  apigateway:
    build: ./apigateway
    container_name: apigateway
    ports:
      - "8083:8083"
    depends_on:
      - serviceregistry
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://serviceregistry:8761/eureka/
    networks:
      - micro-net

networks:
  micro-net: